<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flappy Ma W</title>
  <meta name="theme-color" content="#1d254b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flappy Ma W">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="imgcarte.png">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #141933;
      font-family: Arial, Helvetica, sans-serif;
      display: grid;
      place-items: center;
    }
    .app {
      position: relative;
      width: min(100vw, 520px);
      height: min(calc(100vw * 1.3846), 720px);
      max-height: 100vh;
    }
    canvas {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(0,0,0,.45);
      touch-action: manipulation;
      background: linear-gradient(#48588d, #1f264d);
      display: block;
    }
    .overlay {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      padding: 24px;
      background: linear-gradient(rgba(19,25,52,.50), rgba(19,25,52,.82));
      backdrop-filter: blur(2px);
    }
    .overlay.hidden { display: none; }
    .menu-card {
      width: 100%;
      max-width: 380px;
      background: rgba(14, 20, 44, 0.62);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      border-radius: 24px;
      padding: 22px 22px 18px;
      color: white;
      text-align: center;
    }
    .menu-image {
      width: 100%;
      border-radius: 20px;
      display: block;
      box-shadow: 0 14px 28px rgba(0,0,0,.35);
      margin-bottom: 18px;
    }
    .menu-title {
      font-size: 30px;
      font-weight: 700;
      margin: 0 0 6px;
    }
    .menu-subtitle {
      margin: 0 0 18px;
      color: rgba(255,255,255,.82);
      line-height: 1.4;
      font-size: 15px;
    }
    .menu-actions {
      display: grid;
      gap: 12px;
    }
    .btn {
      border: 0;
      border-radius: 14px;
      height: 48px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-play {
      background: #d7e41f;
      color: #24305a;
    }
    .btn-secondary {
      background: rgba(255,255,255,.10);
      color: white;
    }
    .score-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.07);
      display: none;
    }
    .score-box.visible { display: block; }
    .score-line {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 17px;
    }
  </style>
</head>
<body>
  <div class="app">
    <canvas id="game" width="520" height="720"></canvas>

    <div class="overlay" id="menuOverlay">
      <div class="menu-card">
        <img class="menu-image" src="imgcarte.png" alt="Carte Ma W">
        <h1 class="menu-title">Flappy Ma W</h1>
        <p class="menu-subtitle">Évite les obstacles et fais le meilleur score possible avec ta carte MA W.</p>
        <div class="menu-actions">
          <button class="btn btn-play" id="playBtn">Jouer</button>
          <button class="btn btn-secondary" id="scoresBtn">Mes scores</button>
        </div>
        <div class="score-box" id="scoreBox">
          <div class="score-line"><span>Dernier score</span><strong id="lastScoreValue">0</strong></div>
          <div class="score-line"><span>Meilleur score</span><strong id="bestScoreValue">0</strong></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const menuOverlay = document.getElementById("menuOverlay");
    const playBtn = document.getElementById("playBtn");
    const scoresBtn = document.getElementById("scoresBtn");
    const scoreBox = document.getElementById("scoreBox");
    const lastScoreValue = document.getElementById("lastScoreValue");
    const bestScoreValue = document.getElementById("bestScoreValue");

    const W = canvas.width;
    const H = canvas.height;
    const FLOOR_H = 42;
    const FLOOR_Y = H - FLOOR_H;
    const PIPE_W = 92;
    const GAP_H = 210;
    const PIPE_SPACING = 245;
    const PIPE_SPEED = 2.5;
    const GRAVITY = 0.42;
    const FLAP = -7.0;

    let state = "menu";
    let score = 0;
    let best = Number(localStorage.getItem("maw_best_realcard") || 0);
    let lastScore = Number(localStorage.getItem("maw_last_realcard") || 0);

    const card = new Image();
    card.src = "crte.png";

    const player = {
      x: 120,
      y: 330,
      w: 154,
      h: 92,
      vy: 0,
      rot: -0.18
    };

    const clouds = [
      {x: 40, y: 70, s: 1.35},
      {x: 155, y: 76, s: 1.0},
      {x: 235, y: 128, s: 0.8},
      {x: 460, y: 78, s: 0.82}
    ];

    const pipes = [];

    function resetGame() {
      score = 0;
      player.y = 330;
      player.vy = 0;
      player.rot = -0.18;
      pipes.length = 0;
      for (let i = 0; i < 3; i++) addPipe(W + 110 + i * PIPE_SPACING);
      pipes[0].x = 375;
      pipes[0].top = 240;
      pipes[0].label = "LOISIRS";
    }

    function showMenu() {
      best = Number(localStorage.getItem("maw_best_realcard") || 0);
      lastScore = Number(localStorage.getItem("maw_last_realcard") || 0);
      lastScoreValue.textContent = String(lastScore);
      bestScoreValue.textContent = String(best);
      menuOverlay.classList.remove("hidden");
      scoreBox.classList.remove("visible");
      state = "menu";
    }

    function startGame() {
      resetGame();
      state = "playing";
      menuOverlay.classList.add("hidden");
      flapNow();
    }

    function addPipe(x) {
      const minTop = 95;
      const maxTop = FLOOR_Y - GAP_H - 90;
      const top = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;
      const labels = ["LOISIRS", "RESTO", "CINÉ", "SHOP"];
      pipes.push({
        x,
        top,
        passed: false,
        label: labels[Math.floor(Math.random() * labels.length)]
      });
    }

    function flapNow() {
      if (state !== "playing") return;
      player.vy = FLAP;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawCloud(x, y, s) {
      ctx.save();
      ctx.globalAlpha = 0.10;
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.ellipse(x, y, 38*s, 26*s, 0, 0, Math.PI*2);
      ctx.ellipse(x+34*s, y-8*s, 26*s, 22*s, 0, 0, Math.PI*2);
      ctx.ellipse(x+66*s, y+2*s, 30*s, 23*s, 0, 0, Math.PI*2);
      ctx.ellipse(x+26*s, y+12*s, 42*s, 28*s, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0, "#4a578c");
      g.addColorStop(1, "#1d254b");
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);

      ctx.fillStyle = "rgba(255,255,255,0.05)";
      ctx.beginPath();
      ctx.moveTo(0,60);
      ctx.bezierCurveTo(70,10,140,10,190,58);
      ctx.bezierCurveTo(250,105,310,35,390,58);
      ctx.bezierCurveTo(445,72,484,110,520,34);
      ctx.lineTo(520,0);
      ctx.lineTo(0,0);
      ctx.closePath();
      ctx.fill();

      clouds.forEach(c => drawCloud(c.x, c.y, c.s));

      ctx.save();
      ctx.translate(330, 430);
      ctx.rotate(0.60);
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      roundRect(-35, -330, 78, 760, 28);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.beginPath();
      ctx.moveTo(432, 74);
      ctx.lineTo(500, 152);
      ctx.lineTo(470, 192);
      ctx.lineTo(448, 142);
      ctx.fill();

      const buildings = [
        [2,44,26],[36,60,70],[140,72,68],[243,44,68],[350,52,38],[392,80,82],[486,44,32]
      ];
      for (let i = 0; i < buildings.length; i++) {
        const x = buildings[i][0];
        const h = buildings[i][1];
        const w = buildings[i][2];
        ctx.fillStyle = i % 2 ? "rgba(195,205,245,0.10)" : "rgba(195,205,245,0.07)";
        ctx.fillRect(x, FLOOR_Y - h, w, h);
        ctx.fillStyle = "rgba(216,227,28,0.32)";
        ctx.fillRect(x + 4, FLOOR_Y - h + 8, Math.max(18, w - 10), 6);

        for (let ry = 0; ry < 2; ry++) {
          for (let rx = 0; rx < 2; rx++) {
            const wx = x + 12 + rx * 18;
            const wy = FLOOR_Y - h + 24 + ry * 16;
            if (wx + 10 < x + w) {
              ctx.fillStyle = "rgba(195,205,245,0.18)";
              ctx.fillRect(wx, wy, 12, 12);
            }
          }
        }
      }

      ctx.fillStyle = "#d7e41f";
      ctx.fillRect(0, FLOOR_Y - 3, W, 3);
      ctx.fillStyle = "rgba(124,135,190,0.38)";
      for (let i = 0; i < 13; i++) ctx.fillRect(12 + i * 39, FLOOR_Y + 12, 23, 23);
    }

    function drawPipe(pipe) {
      const x = pipe.x;
      const innerW = 62;
      const innerX = x + (PIPE_W - innerW) / 2;
      const labelW = 112;
      const labelH = 38;
      const labelX = x + (PIPE_W - labelW) / 2;
      const lime = "#d7e41f";

      ctx.fillStyle = lime;
      ctx.fillRect(innerX, 8, 6, pipe.top);
      ctx.fillRect(innerX + innerW - 6, 8, 6, pipe.top);
      ctx.fillRect(innerX - 10, 0, innerW + 20, 10);
      ctx.fillRect(innerX - 10, pipe.top, innerW + 20, 10);
      roundRect(labelX, pipe.top - 38, labelW, labelH, 10);
      ctx.fill();

      const bottomY = pipe.top + GAP_H;
      const bottomH = FLOOR_Y - 10 - bottomY;
      ctx.fillRect(innerX, bottomY, 6, bottomH);
      ctx.fillRect(innerX + innerW - 6, bottomY, 6, bottomH);
      ctx.fillRect(innerX - 10, bottomY - 10, innerW + 20, 10);
      ctx.fillRect(innerX - 10, FLOOR_Y - 10, innerW + 20, 10);
      roundRect(labelX, bottomY + 10, labelW, labelH, 10);
      ctx.fill();

      ctx.fillStyle = "#273052";
      ctx.font = "bold 18px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(pipe.label, labelX + labelW / 2, pipe.top - 19);
      ctx.fillText(pipe.label, labelX + labelW / 2, bottomY + 29);
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.rot);
      ctx.shadowColor = "rgba(220,230,255,.70)";
      ctx.shadowBlur = 22;
      ctx.shadowOffsetY = 8;

      if (card.complete && card.naturalWidth > 0) {
        ctx.drawImage(card, -player.w/2, -player.h/2, player.w, player.h);
      } else {
        ctx.fillStyle = "#253050";
        roundRect(-player.w/2, -player.h/2, player.w, player.h, 8);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawHUD() {
      ctx.fillStyle = "rgba(18,24,50,0.44)";
      roundRect(18, 18, 104, 58, 16);
      ctx.fill();
      roundRect(W - 164, 8, 104, 68, 16);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.font = "bold 18px Arial";
      ctx.fillText("Score", 36, 28);
      ctx.fillText("Meilleur", W - 146, 22);
      ctx.font = "bold 22px Arial";
      ctx.fillText(String(score), 36, 50);
      ctx.fillText(String(best), W - 146, 45);
    }

    function drawGameOver() {
      if (state !== "gameover") return;
      ctx.fillStyle = "rgba(15,18,36,.65)";
      roundRect(100, 250, 320, 156, 20);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "bold 30px Arial";
      ctx.fillText("Perdu", W / 2, 286);
      ctx.font = "18px Arial";
      ctx.fillText("Score : " + score + "  •  Meilleur : " + best, W / 2, 328);

      ctx.fillStyle = "#d7e41f";
      roundRect(162, 350, 196, 42, 12);
      ctx.fill();

      ctx.fillStyle = "#263154";
      ctx.font = "bold 18px Arial";
      ctx.fillText("Retour menu...", W / 2, 377);
    }

    function hitPipe(pipe) {
      const left = player.x - player.w * 0.28;
      const right = player.x + player.w * 0.28;
      const top = player.y - player.h * 0.28;
      const bottom = player.y + player.h * 0.28;
      const pipeLeft = pipe.x;
      const pipeRight = pipe.x + PIPE_W;
      const gapTop = pipe.top;
      const gapBottom = pipe.top + GAP_H;

      const overlapX = right > pipeLeft && left < pipeRight;
      const outsideGap = top < gapTop || bottom > gapBottom;
      return overlapX && outsideGap;
    }

    function gameOver() {
      if (state !== "playing") return;
      state = "gameover";
      lastScore = score;
      localStorage.setItem("maw_last_realcard", String(lastScore));
      if (score > best) {
        best = score;
        localStorage.setItem("maw_best_realcard", String(best));
      }
      setTimeout(showMenu, 1300);
    }

    function update() {
      for (const c of clouds) {
        c.x -= 0.12 * c.s;
        if (c.x < -120) c.x = W + 20;
      }

      if (state !== "playing") return;

      player.vy += GRAVITY;
      player.y += player.vy;
      player.rot = Math.max(-0.40, Math.min(1.0, -0.22 + player.vy * 0.05));

      for (const pipe of pipes) {
        pipe.x -= PIPE_SPEED;

        if (!pipe.passed && pipe.x + PIPE_W < player.x - 10) {
          pipe.passed = true;
          score++;
          if (score > best) {
            best = score;
            localStorage.setItem("maw_best_realcard", String(best));
          }
        }

        if (hitPipe(pipe)) gameOver();
      }

      if (pipes.length && pipes[0].x + PIPE_W < -10) {
        pipes.shift();
        addPipe(pipes[pipes.length - 1].x + PIPE_SPACING);
      }

      if (player.y - player.h / 2 < -30 || player.y + player.h / 2 > FLOOR_Y) {
        gameOver();
      }
    }

    function render() {
      drawBackground();
      pipes.forEach(drawPipe);
      drawPlayer();
      drawHUD();
      drawGameOver();
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        if (state === "playing") flapNow();
      }
    });

    canvas.addEventListener("pointerdown", () => {
      if (state === "playing") flapNow();
      else if (state === "gameover") showMenu();
    });

    playBtn.addEventListener("click", startGame);
    scoresBtn.addEventListener("click", () => {
      best = Number(localStorage.getItem("maw_best_realcard") || 0);
      lastScore = Number(localStorage.getItem("maw_last_realcard") || 0);
      lastScoreValue.textContent = String(lastScore);
      bestScoreValue.textContent = String(best);
      scoreBox.classList.toggle("visible");
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    }

    resetGame();
    showMenu();
    loop();
  </script>
</body>
</html>
