<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Ma W — carte exacte</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #141933;
      font-family: Arial, Helvetica, sans-serif;
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(100vw, 520px);
      height: auto;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(0,0,0,.45);
      touch-action: manipulation;
      background: linear-gradient(#48588d, #1f264d);
    }
  </style>
</head>
<body>
  <canvas id="game" width="520" height="720"></canvas>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;
    const FLOOR_H = 42;
    const FLOOR_Y = H - FLOOR_H;
    const PIPE_W = 92;
    const GAP_H = 210;
    const PIPE_SPACING = 245;
    const PIPE_SPEED = 2.5;
    const GRAVITY = 0.42;
    const FLAP = -7.0;

    let state = "start";
    let score = 0;
    let best = Number(localStorage.getItem("maw_best_realcard") || 0);
    let frame = 0;

    const card = new Image();
    card.src = "crte.png"; // exact uploaded card image

    const player = {
      x: 120,
      y: 330,
      w: 154,
      h: 92,
      vy: 0,
      rot: -0.18
    };

    const clouds = [
      {x: 40, y: 70, s: 1.35},
      {x: 155, y: 76, s: 1.0},
      {x: 235, y: 128, s: 0.8},
      {x: 460, y: 78, s: 0.82}
    ];

    const pipes = [];

    function resetGame() {
      state = "start";
      score = 0;
      player.y = 330;
      player.vy = 0;
      player.rot = -0.18;
      pipes.length = 0;
      for (let i = 0; i < 3; i++) addPipe(W + 110 + i * PIPE_SPACING);
      pipes[0].x = 375;
      pipes[0].top = 240;
      pipes[0].label = "LOISIRS";
    }

    function addPipe(x) {
      const minTop = 95;
      const maxTop = FLOOR_Y - GAP_H - 90;
      const top = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;
      const labels = ["LOISIRS", "RESTO", "CINÉ", "SHOP"];
      pipes.push({
        x,
        top,
        passed: false,
        label: labels[Math.floor(Math.random() * labels.length)]
      });
    }

    function flapNow() {
      if (state === "gameover") {
        resetGame();
        state = "playing";
      } else if (state === "start") {
        state = "playing";
      }
      player.vy = FLAP;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawCloud(x, y, s) {
      ctx.save();
      ctx.globalAlpha = 0.10;
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.ellipse(x, y, 38*s, 26*s, 0, 0, Math.PI*2);
      ctx.ellipse(x+34*s, y-8*s, 26*s, 22*s, 0, 0, Math.PI*2);
      ctx.ellipse(x+66*s, y+2*s, 30*s, 23*s, 0, 0, Math.PI*2);
      ctx.ellipse(x+26*s, y+12*s, 42*s, 28*s, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0, "#4a578c");
      g.addColorStop(1, "#1d254b");
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);

      ctx.fillStyle = "rgba(255,255,255,0.05)";
      ctx.beginPath();
      ctx.moveTo(0,60);
      ctx.bezierCurveTo(70,10,140,10,190,58);
      ctx.bezierCurveTo(250,105,310,35,390,58);
      ctx.bezierCurveTo(445,72,484,110,520,34);
      ctx.lineTo(520,0);
      ctx.lineTo(0,0);
      ctx.closePath();
      ctx.fill();

      clouds.forEach(c => drawCloud(c.x, c.y, c.s));

      ctx.save();
      ctx.translate(330, 430);
      ctx.rotate(0.60);
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      roundRect(-35, -330, 78, 760, 28);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.beginPath();
      ctx.moveTo(432, 74);
      ctx.lineTo(500, 152);
      ctx.lineTo(470, 192);
      ctx.lineTo(448, 142);
      ctx.fill();

      const buildings = [
        [2,44,26],[36,60,70],[140,72,68],[243,44,68],[350,52,38],[392,80,82],[486,44,32]
      ];
      for (let i = 0; i < buildings.length; i++) {
        const [x,h,w] = buildings[i];
        ctx.fillStyle = i % 2 ? "rgba(195,205,245,0.10)" : "rgba(195,205,245,0.07)";
        ctx.fillRect(x, FLOOR_Y - h, w, h);
        ctx.fillStyle = "rgba(216,227,28,0.32)";
        ctx.fillRect(x + 4, FLOOR_Y - h + 8, Math.max(18, w - 10), 6);

        for (let ry = 0; ry < 2; ry++) {
          for (let rx = 0; rx < 2; rx++) {
            const wx = x + 12 + rx * 18;
            const wy = FLOOR_Y - h + 24 + ry * 16;
            if (wx + 10 < x + w) {
              ctx.fillStyle = "rgba(195,205,245,0.18)";
              ctx.fillRect(wx, wy, 12, 12);
            }
          }
        }
      }

      ctx.fillStyle = "#d7e41f";
      ctx.fillRect(0, FLOOR_Y - 3, W, 3);
      ctx.fillStyle = "rgba(124,135,190,0.38)";
      for (let i = 0; i < 13; i++) ctx.fillRect(12 + i * 39, FLOOR_Y + 12, 23, 23);
    }

    function drawPipe(pipe) {
      const x = pipe.x;
      const innerW = 62;
      const innerX = x + (PIPE_W - innerW) / 2;
      const labelW = 112;
      const labelH = 38;
      const labelX = x + (PIPE_W - labelW) / 2;
      const lime = "#d7e41f";

      // top
      ctx.fillStyle = lime;
      ctx.fillRect(innerX, 8, 6, pipe.top);
      ctx.fillRect(innerX + innerW - 6, 8, 6, pipe.top);
      ctx.fillRect(innerX - 10, 0, innerW + 20, 10);
      ctx.fillRect(innerX - 10, pipe.top, innerW + 20, 10);

      roundRect(labelX, pipe.top - 38, labelW, labelH, 10);
      ctx.fill();

      // bottom
      const bottomY = pipe.top + GAP_H;
      const bottomH = FLOOR_Y - 10 - bottomY;
      ctx.fillRect(innerX, bottomY, 6, bottomH);
      ctx.fillRect(innerX + innerW - 6, bottomY, 6, bottomH);
      ctx.fillRect(innerX - 10, bottomY - 10, innerW + 20, 10);
      ctx.fillRect(innerX - 10, FLOOR_Y - 10, innerW + 20, 10);

      roundRect(labelX, bottomY + 10, labelW, labelH, 10);
      ctx.fill();

      ctx.fillStyle = "#273052";
      ctx.font = "bold 18px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(pipe.label, labelX + labelW / 2, pipe.top - 19);
      ctx.fillText(pipe.label, labelX + labelW / 2, bottomY + 29);
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.rot);
      ctx.shadowColor = "rgba(220,230,255,.70)";
      ctx.shadowBlur = 22;
      ctx.shadowOffsetY = 8;

      if (card.complete && card.naturalWidth > 0) {
        ctx.drawImage(card, -player.w/2, -player.h/2, player.w, player.h);
      } else {
        ctx.fillStyle = "#253050";
        roundRect(-player.w/2, -player.h/2, player.w, player.h, 8);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawHUD() {
      ctx.fillStyle = "rgba(18,24,50,0.44)";
      roundRect(18, 18, 104, 58, 16);
      ctx.fill();
      roundRect(W - 164, 8, 104, 68, 16);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.font = "bold 18px Arial";
      ctx.fillText("Score", 36, 28);
      ctx.fillText("Meilleur", W - 146, 22);
      ctx.font = "bold 22px Arial";
      ctx.fillText(String(score), 36, 50);
      ctx.fillText(String(best), W - 146, 45);
    }

    function drawOverlay() {
      if (state === "playing") return;
      ctx.textAlign = "center";
      if (state === "start") {
        ctx.fillStyle = "rgba(15,18,36,.22)";
        roundRect(110, 290, 300, 86, 18);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "bold 25px Arial";
        ctx.fillText("Touchez pour jouer", W / 2, 323);
        ctx.font = "16px Arial";
        ctx.fillText("Le personnage est exactement votre carte jointe.", W / 2, 352);
      } else {
        ctx.fillStyle = "rgba(15,18,36,.65)";
        roundRect(102, 248, 316, 152, 20);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "bold 30px Arial";
        ctx.fillText("Perdu", W / 2, 282);
        ctx.font = "18px Arial";
        ctx.fillText("Score : " + score + "  •  Meilleur : " + best, W / 2, 326);
        ctx.fillStyle = "#d7e41f";
        roundRect(162, 350, 196, 40, 12);
        ctx.fill();
        ctx.fillStyle = "#263154";
        ctx.font = "bold 18px Arial";
        ctx.fillText("Rejouer", W / 2, 375);
      }
    }

    function hitPipe(pipe) {
      const left = player.x - player.w * 0.28;
      const right = player.x + player.w * 0.28;
      const top = player.y - player.h * 0.28;
      const bottom = player.y + player.h * 0.28;
      const pipeLeft = pipe.x;
      const pipeRight = pipe.x + PIPE_W;
      const gapTop = pipe.top;
      const gapBottom = pipe.top + GAP_H;

      const overlapX = right > pipeLeft && left < pipeRight;
      const outsideGap = top < gapTop || bottom > gapBottom;
      return overlapX && outsideGap;
    }

    function update() {
      frame++;
      for (const c of clouds) {
        c.x -= 0.12 * c.s;
        if (c.x < -120) c.x = W + 20;
      }

      if (state !== "playing") return;

      player.vy += GRAVITY;
      player.y += player.vy;
      player.rot = Math.max(-0.40, Math.min(1.0, -0.22 + player.vy * 0.05));

      for (const pipe of pipes) {
        pipe.x -= PIPE_SPEED;

        if (!pipe.passed && pipe.x + PIPE_W < player.x - 10) {
          pipe.passed = true;
          score++;
          if (score > best) {
            best = score;
            localStorage.setItem("maw_best_realcard", String(best));
          }
        }

        if (hitPipe(pipe)) state = "gameover";
      }

      if (pipes.length && pipes[0].x + PIPE_W < -10) {
        pipes.shift();
        addPipe(pipes[pipes.length - 1].x + PIPE_SPACING);
      }

      if (player.y - player.h / 2 < -30 || player.y + player.h / 2 > FLOOR_Y) {
        state = "gameover";
      }
    }

    function render() {
      drawBackground();
      pipes.forEach(drawPipe);
      drawPlayer();
      drawHUD();
      drawOverlay();
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        flapNow();
      }
    });
    canvas.addEventListener("pointerdown", flapNow);

    resetGame();
    loop();
  </script>
</body>
</html>
